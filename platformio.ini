; CYD (ESP32-2432S028R) 데스크 시계
; 참고: 사용자 홈 경로에 한글이 포함되어 있어 툴체인 경로 문제를 피하려고
; core_dir / build_dir 를 ASCII 경로로 지정했습니다. 다른 PC에서는 지워도 됩니다.
[platformio]
core_dir = C:/Users/Public/pio-core
build_dir = C:/Users/Public/pio-build/cyd-deskclock
default_envs = cyd

[env:cyd]
platform = espressif32@6.9.0
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_speed = 921600
board_build.partitions = huge_app.csv
build_flags =
    -DCORE_DEBUG_LEVEL=0
lib_deps =
    lovyan03/LovyanGFX@^1.1.16
    tzapu/WiFiManager@^2.0.17
